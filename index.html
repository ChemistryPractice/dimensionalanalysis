<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dimensional Analysis Hub</title>

    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            options: {
                skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --error: #c0392b; --bg: #f4f7f6; --sidebar-w: 260px; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: var(--sidebar-w); background: var(--primary); color: white; display: flex; flex-direction: column; padding: 20px; }
        #sidebar h2 { text-align: center; margin-bottom: 20px; }
        .nav-btn { background: none; border: 1px solid #455a64; color: white; padding: 12px; margin-bottom: 8px; border-radius: 5px; cursor: pointer; text-align: left; }
        .nav-btn:hover { background: #34495e; }
        .nav-btn.active { background: var(--accent); border-color: var(--accent); }
        .ref-group { margin-top: auto; border-top: 1px solid #455a64; padding-top: 20px; }
        .ref-btn { background: #7f8c8d; }
        #main-content { flex-grow: 1; padding: 40px; display: flex; flex-direction: column; align-items: center; overflow-y: auto; }
        .card { background: white; padding: 30px; border-radius: 15px; width: 100%; max-width: 800px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #problem-area { font-size: 1.4rem; margin-top: 30px; min-height: 200px; text-align: center; }
        .answer-box { margin-top: 20px; padding: 20px; background: #f9f9f9; border-left: 5px solid var(--accent); border-radius: 5px; width: 100%; overflow-x: auto; }
        .hidden { display: none; }
        .overlay { display: none; position: fixed; top: 5%; left: 280px; right: 20px; bottom: 5%; background: white; border-radius: 10px; z-index: 100; padding: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.3); }
        .close-btn { background: var(--error); color: white; border: none; padding: 5px 15px; cursor: pointer; border-radius: 3px; }
    </style>
</head>

<body>

<div id="sidebar">
    <h2>Dimensional Analysis</h2>
    <button class="nav-btn" onclick="setMode('single', event)">Metric to Metric</button>
    <button class="nav-btn" onclick="setMode('multi', event)">Metric / Imperial</button>
    <button class="nav-btn" onclick="setMode('double', event)">Double Conversions</button>
    <div class="ref-group">
        <button class="nav-btn ref-btn" onclick="toggleRef('calc')">Calculator</button>
        <button class="nav-btn ref-btn" onclick="toggleRef('ptable')">Periodic Table</button>
        <button class="nav-btn ref-btn" onclick="toggleRef('eqn')">Equation Sheet</button>
    </div>
</div>

<div id="main-content">
    <div class="card">
        <h1 id="topic-title">Conversion Practice</h1>
        <div id="instruction-box" style="background: #e8f4fd; padding: 15px; border-left: 5px solid #3498db; margin-bottom: 20px; border-radius: 5px;">
            <strong>How to use:</strong> Work the problem on paper, then click <strong>Check Answer</strong> to see the "Railroad Track" setup and the final value (rounded to correct sig figs).
        </div>

        <div id="problem-area">
            <p id="problem-text" style="color: #7f8c8d;">Select a mode from the sidebar.</p>
            <div id="answer-display" class="answer-box hidden"></div>
            <div style="margin-top: 30px; display: flex; gap: 10px; justify-content: center;">
                <button id="gen-btn" class="nav-btn" style="background: var(--accent); padding: 12px 25px; display:none;" onclick="generateProblem()">New Problem</button>
                <button id="check-btn" class="nav-btn" style="background: var(--primary); padding: 12px 25px; display:none;" onclick="toggleAnswer()">Check Answer</button>
            </div>
        </div>
    </div>
</div>

<div id="calc" class="overlay"><button class="close-btn" onclick="toggleRef('calc')">X</button><iframe src="https://www.desmos.com/scientific" width="100%" height="90%"></iframe></div>
<div id="ptable" class="overlay"><button class="close-btn" onclick="toggleRef('ptable')">X</button><iframe src="https://ptable.com" width="100%" height="90%"></iframe></div>
<div id="eqn" class="overlay"><button class="close-btn" onclick="toggleRef('eqn')">X</button><object data="Equation_Sheet2.pdf" type="application/pdf" width="100%" height="90%"></object></div>

<script>
    let currentProblem = null;
    let currentMode = '';

    const prefixes = [
        { s: 'M', f: 1e6 }, { s: 'k', f: 1e3 }, { s: '', f: 1 }, 
        { s: 'c', f: 1e-2 }, { s: 'm', f: 1e-3 }, { s: 'μ', f: 1e-6 }, 
        { s: 'n', f: 1e-9 }, { s: 'p', f: 1e-12 }
    ];

    const bases = {
        mass: { s: 'g', bridge: { to: 'lb', val: 0.00220462 } },
        length: { s: 'm', bridge: { to: 'in', val: 39.3701 } },
        volume: { s: 'L', bridge: { to: 'gal', val: 0.264172 } }
    };

    const imperial = {
        mass: [{ s: 'lb', r: 1 }, { s: 'oz', r: 16 }],
        length: [{ s: 'in', r: 1 }, { s: 'ft', r: 1/12 }, { s: 'mi', r: 1/63360 }],
        volume: [{ s: 'gal', r: 1 }]
    };

    function countSigFigs(n) {
        let s = n.toString().replace('.', '').replace(/^-/, '');
        if (n.toString().includes('.')) return s.replace(/^0+/, '').length;
        return s.replace(/0+$/, '').replace(/^0+/, '').length;
    }

    function formatSF(num, target) {
        let res = Number(num).toPrecision(target);
        if (res.includes('e')) {
            let [b, e] = res.split('e');
            return `${b} \\times 10^{${e.replace('+', '')}}`;
        }
        return res;
    }

    function setMode(mode, e) {
        currentMode = mode;
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        document.getElementById('gen-btn').style.display = 'inline-block';
        document.getElementById('check-btn').style.display = 'inline-block';
        generateProblem();
    }

    function generateProblem() {
    document.getElementById('answer-display').classList.add('hidden');
    const sf = Math.floor(Math.random() * 2) + 3; // 3 or 4 sig figs
    let val = (Math.random() * 90 + 10).toPrecision(sf);
    
    const cat = ['mass', 'length', 'volume'][Math.floor(Math.random()*3)];
    const b = bases[cat];
    let start, end, top = [], bot = [], run = parseFloat(val);

    if (currentMode === 'single') {
        let p1 = prefixes[Math.floor(Math.random()*prefixes.length)];
        let p2 = prefixes[Math.floor(Math.random()*prefixes.length)];
        while(p1.s === p2.s) p2 = prefixes[Math.floor(Math.random()*prefixes.length)];
        
        start = p1.s + b.s; 
        end = p2.s + b.s;
        top.push(`${val} \\text{ ${start}}`);
        bot.push(` `);

        // --- STEP 1: Start Unit to Base Unit ---
        if (p1.f >= 1) { 
            // Start is bigger or equal to base (e.g., kg to g)
            // 1 kg = 1000 g
            top.push(`${p1.f} \\text{ ${b.s}}`);
            bot.push(`1 \\text{ ${start}}`);
        } else { 
            // Start is smaller than base (e.g., mg to g)
            // 1 g = 1000 mg
            top.push(`1 \\text{ ${b.s}}`);
            bot.push(`${1 / p1.f} \\text{ ${start}}`);
        }
        run = run * p1.f; // Mathematically convert to base

        // --- STEP 2: Base Unit to End Unit ---
        if (p2.f >= 1) { 
            // End unit is bigger than base (e.g., g to kg)
            // 1 kg = 1000 g
            top.push(`1 \\text{ ${end}}`);
            bot.push(`${p2.f} \\text{ ${b.s}}`);
        } else { 
            // End unit is smaller than base (e.g., g to mg)
            // 1 g = 1000 mg
            top.push(`${1 / p2.f} \\text{ ${end}}`);
            bot.push(`1 \\text{ ${b.s}}`);
        }
        run = run / p2.f; // Mathematically convert to target

    } else if (currentMode === 'double') {
        // We will default to Length/Time (e.g., m/hr to km/s)
        const b = bases.length; 
        const sf = Math.floor(Math.random() * 2) + 3;
        let val = (Math.random() * 90 + 10).toPrecision(sf);
        let run = parseFloat(val);

        let p1 = prefixes[Math.floor(Math.random() * 4)]; // Pick larger/common prefixes
        let p2 = prefixes[Math.floor(Math.random() * 4)];
        
        start = `${p1.s}${b.s}/hr`;
        end = `${p2.s}${b.s}/s`;

        top.push(`${val} \\text{ ${p1.s}${b.s}}`);
        bot.push(`1 \\text{ hr}`);

        // 1. Distance Conversion (Numerator) - Big Unit gets the 1
        if (p1.f >= p2.f) {
            // p1 is larger (e.g., km to m) -> 1 km = 1000 m
            top.push(`${p1.f / p2.f} \\text{ ${p2.s}${b.s}}`);
            bot.push(`1 \\text{ ${p1.s}${b.s}}`);
        } else {
            // p2 is larger (e.g., m to km) -> 1 km = 1000 m
            top.push(`1 \\text{ ${p2.s}${b.s}}`);
            bot.push(`${p2.f / p1.f} \\text{ ${p1.s}${b.s}}`);
        }
        run = (run * p1.f) / p2.f;

        // 2. Time Conversion (Denominator) - 1 hr = 3600 s
        top.push(`1 \\text{ hr}`);
        bot.push(`3600 \\text{ s}`);
        run = run / 3600;

        currentProblem = { start, end, ans: formatSF(run, sf), top, bot };
        document.getElementById('problem-text').innerHTML = `Convert <strong>${val} ${start}</strong> to <strong>${end}</strong>`;
}

    function toggleAnswer() {
        const div = document.getElementById('answer-display');
        if (!div.classList.contains('hidden')) { div.classList.add('hidden'); return; }

        let cols = currentProblem.top.length;
        let grid = "|".repeat(cols + 1).split("").join("c");
        let latex = `$$ \\begin{array}{${grid}} ${currentProblem.top.join(" & ")} \\\\ \\hline ${currentProblem.bot.join(" & ")} \\end{array} = ${currentProblem.ans} \\text{ ${currentProblem.end}} $$`;

        div.innerHTML = `<strong>Setup:</strong><br>${latex}`;
        div.classList.remove('hidden');
        
        if(window.MathJax) MathJax.typesetPromise([div]);
    }

    function toggleRef(id) {
        const el = document.getElementById(id);
        el.style.display = (el.style.display === 'block') ? 'none' : 'block';
    }
</script>

</body>
</html>
